@let measureData = measureList();
@let pagination = paginationData();
<div class="List">
  <h3 class="List-title">Listado de {{ entity() }}s</h3>
  <app-measure-searcher
    (results)="handleResults($event)"
  />

  @for (measure of measureData; track measure.id) {
    <app-measure-card
      (click)="this.selectedMeasure.emit(measure)"
      [measure]="measure"
      [route]="route()"
    />
  }

  @if(option()){
    <button class="Boton1" [routerLink]= "`/${route()}/new`">
      Agregar {{ entity() }}s
    </button>
  }
  <app-pagination-buttons
    [pagination]="paginationData()"
    (pageChange)="this.pageChange.emit($event)"
  />
</div>
