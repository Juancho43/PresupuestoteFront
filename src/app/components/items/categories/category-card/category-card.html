@let data = category();
<div class="Card">
  <div class="Card-Details">
    <p>{{data.name}}</p>
  </div>
  <div class="Card-Options">
    <app-card-button-component
      [text]="'Editar'"
      [icon]="'edit'"
      [link]="`/${route()}/edit/category/${data.id!}`"
    />
    <app-card-button-component
      [text]="'Eliminar'"
      [icon]="'delete'"
    />
  </div>
</div>
