@let subcategoryData = subcategoryList();
@let pagination = paginationData();
<div class="List">
  <h3 class="List-title">Listado de {{ entity() }}s</h3>
  <app-subcategory-searcher
    (results)="handleResults($event)"
  />
  <div class="List-card-container">
    @for (subcategory of subcategoryData; track subcategory.id) {
      <app-subcategory-card
        (click)="this.selectedSubcategory.emit(subcategory)"
        [subcategory]="subcategory"
        [route]="route()"
      />
    }
  </div>
  @if(option()){
    <button class="Boton1" [routerLink]= "`/${route()}/new/subcategory`">
      Agregar {{ entity() }}s
    </button>
  }
  <app-pagination-buttons
    [pagination]="pagination"
    (pageChange)="this.pageChange.emit($event)"
  />
</div>
