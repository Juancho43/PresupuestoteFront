@let materialData = materialList();
@let pagination = paginationData();
<div class="List">
  <h3 class="List-title">Listado de {{ entity() }}s</h3>
  <app-material-searcher
    (results)="handleResults($event)"
  />
  <div class="List-card-container">
    @for (material of materialData; track material.id) {
      <app-material-card
          [material]="material"
          [entity]="entity()"
          [route]="route()"
          (click)="selectMaterial(material)"
      />
    }
  </div>
  @if(option()){
    <button class="Boton1" [routerLink]= "`/${route()}/new`">
      Agregar {{ entity() }}s
    </button>
  }
  <app-pagination-buttons
    [pagination]="pagination"
    (pageChange)="this.pageChange.emit($event)"
  />

</div>
