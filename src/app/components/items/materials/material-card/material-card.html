@let data = material();
<div class="Card">
  <div class="Card-Details">
    <p>{{data.name}}</p>
    <p>{{data.brand}}</p>
    <p>{{data.measure.abbreviation}}</p>
  </div>
  <div class="Card-Options">
    <app-card-button
      [text]="'Ver detalles'"
      [icon]="'info'"
      [link]="`/${route()}/detail/${data.id!}`"
    />
    <app-card-button
      [text]="'Editar'"
      [icon]="'edit'"
      [link]="`/${route()}/edit/material/${data.id!}`"
    />
  </div>
</div>
