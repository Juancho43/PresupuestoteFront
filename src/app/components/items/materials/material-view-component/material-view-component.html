@let materialList = this.materialResource.value()!.data!.results;
@let subcategoryList = this.subcategoryResource.value()!.data!.results;
@let categoryList = this.categoryResource.value()!.data!.results;
@let measureList = this.measureResource.value()!.data!.results;
<section>
  <app-material-list
    [data]="materialList"
    [option]="true"
  />
  <app-subcategory-list
    [data] = "subcategoryList"
    [option]="true"
  />
  <app-category-list
    [data]="categoryList"
    [option]="true"
  />
  <app-measure-list
    [data]="measureList"
    [option]="true"
  />
</section>
