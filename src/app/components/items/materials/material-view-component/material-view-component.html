@let materialList = this.materialResource.value()!.data!;
@let subcategoryList = this.subcategoryResource.value()!.data!;
@let categoryList = this.categoryResource.value()!.data!;
@let measureList = this.measureResource.value()!.data!;
<section>
  <app-material-list
    [data]="materialList"
  />
  <app-subcategory-list
    [data] = "subcategoryList"
  />
  <app-category-list
    [data]="categoryList"
  />
  <app-measure-list
    [data]="measureList"
  />
</section>
