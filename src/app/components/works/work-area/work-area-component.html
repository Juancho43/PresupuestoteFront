@if(!workResource.isLoading() && !workResource.error()) {
  @let work = this.workResource.value()!.data!;

  <section>

    <p [routerLink]="`/budget/detail/${work.budget!.id!}/${work.id!}`" style="color:red">
      ir al presupuesto
    </p>

    <app-work-form
      [budgetId]="work.budget!.id!"
      [item]="material()"
      [work]="work"
      (selectedItem)="onEditMaterial($event)"
    />

    <app-material-join
      [item]="item()"
      (finalItem)="onEditedMaterial($event)"
    />

  </section>


}
