@let data = this.clientsResource.value()?.data!.results;
@let pagination = this.clientsResource.value()?.data!.pagination;

<section>
  @if(!this.clientsResource.isLoading() && !this.clientsResource.error()){

    <app-person-list-component
      [data] = data
      entity="cliente"
      route="client"
      action="budget"
      [pagination]="pagination"
      [option]="false"
      (changePage)="this.page.set($event)"
    />
    <app-client-form
      [id] = this.id()
      (submitted)="onFormSubmitted()"
    />
  }
</section>
