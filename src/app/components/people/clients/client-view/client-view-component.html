@let data = this.clientsResource.value()?.data!;

<section>
  @if(!this.clientsResource.isLoading() && !this.clientsResource.error()){

    <app-person-list-component
      [data] = data
      entity="cliente"
      route="client"
      action="budget"
      [option]="false"
    />
    <app-client-form
      [id] = this.id()
      (submitted)="onFormSubmitted()"
    />
  }
</section>
