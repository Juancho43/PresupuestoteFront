@let client = clientResource.value()?.data!;
@let payments = paymentsResource.value()?.data!.results;
@let paymentsPagination = paymentsResource.value()?.data!.pagination;
@if (!clientResource.isLoading() && !paymentsResource.isLoading()) {

  <section>
    <article>
      <app-client
        [client]="client"
      />
      <app-payment-form
        [paybleType]="Payables.Budget"
        [payment]="selectedPayment()"
        [ownable]="selectedBudget()"
        [payable]="pagable"
        (submitted)="this.paymentsResource.reload(); this.clientResource.reload()"
        (reset)="reset()"
      />
    </article>
    <app-payment-list
      [data]="payments"
      [pagination]="paymentsPagination"
      (pageChange)="paymentsPage.set($event)"
      (selectedPayment)="this.selectedPayment.set($event)"
    />
    <app-ownable-list
      [data]="client.budgets!"
      [entity]="pagable"
      [route]="payableEntity.Budget"
      [option]="true"
      [personId]="client.id!"
      [pagination]="undefined"
      (selected)="this.selectedBudget.set($event)"
    />
  </section>
}
