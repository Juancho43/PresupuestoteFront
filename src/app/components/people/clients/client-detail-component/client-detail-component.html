@let client = clientResource.value()?.data!;
@let payments = paymentsResource.value()?.data!;
<section>
  <article>
    <app-client [client]="client"/>
    <app-payments-table-component [payments]="payments"/>
  </article>
  <app-ownable-list
    [data]="client.budgets!"
    entity="presupuesto"
    route="budget"
    [option]="true"
    [personId]="client.id!"
  />
</section>
