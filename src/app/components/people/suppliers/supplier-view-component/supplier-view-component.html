@let data = this.supplierResource.value()?.data!.results;
@let pagination = this.supplierResource.value()?.data!.pagination;

<section>
  @if(!this.supplierResource.isLoading() && !this.supplierResource.error()){

    <app-person-list
      [data] = data
      entity="proveedor"
      route="supplier"
      action="invoice"
      [option]="false"
      [pagination]="pagination"
      (changePage)="this.page.set($event)"
    />
    <app-supplier-form
      [id] = this.id()
      (submitted)="onFormSubmitted()"
    />
  }
</section>
