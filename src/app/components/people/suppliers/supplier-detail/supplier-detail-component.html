@let supplier = supplierResource.value()?.data!;
@let payments = paymentsResource.value()?.data!.results;
@let paymentsPagination = paymentsResource.value()?.data!.pagination;
@if (!supplierResource.isLoading() && !paymentsResource.isLoading()) {

  <section>
    <article>
      <app-supplier [supplier]="supplier"/>
      <app-payment-form
        [paybleType]="Payables.Invoice"
        [payment]="selectedPayment()"
        [ownable]="selectedInvoice()"
        payable="boleta"
        (submitted)="this.paymentsResource.reload(); this.supplierResource.reload()"
      />
    </article>
    <app-payment-list
      [data]="payments"
      [pagination]="paymentsPagination"
      (pageChange)="paymentsPage.set($event)"
      (selectedPayment)="this.selectedPayment.set($event)"
    />
    <app-ownable-list
      [data]="supplier.invoices!"
      entity="boleta"
      route="invoice"
      [option]="true"
      [pagination]="pagination"
      (selected)="this.selectedInvoice.set($event)"
    />
  </section>
}
