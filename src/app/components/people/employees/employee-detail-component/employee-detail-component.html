@let employee = employeeResource.value()?.data!;
@let payments = paymentsResource.value()?.data!.results;;
<section>
  <article>
    <app-employee [employee]="employee"/>
    <app-payments-table-component [payments]="payments"/>
  </article>
  <app-ownable-list
    [data]="employee.salaries"
    entity="salario"
    route="salary"
    [option]="true"
  />
</section>
