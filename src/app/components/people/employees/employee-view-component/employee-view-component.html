@let data = this.employeeResource.value()?.data!.results;
@let pagination = this.employeeResource.value()?.data!.pagination;

<section>
  @if(!this.employeeResource.isLoading() && !this.employeeResource.error()){

    <app-person-list
      [data] = data
      entity="empleado"
      route="employee"
      action="salary"
      [option]="false"
      [pagination]="pagination"
      (changePage)="this.page.set($event)"
    />
    <app-employee-form
      [id] = this.id()
      (submitted)="onFormSubmitted()"
    />
  }
</section>
