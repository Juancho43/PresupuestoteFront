@let data = this.employeeResource.value()?.data!.results;
@let pagination = this.employeeResource.value()?.data!.pagination;

<section>
  @if(!this.employeeResource.isLoading() && !this.employeeResource.error()){

    <app-person-list-component
      [data] = data
      entity="empleado"
      route="employee"
      action="salary"
      [option]="false"
      [pagination]="pagination"
    />
    <app-employee-form-component/>
  }
</section>
