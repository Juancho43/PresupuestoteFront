@let employee = employeeResource.value()?.data!;
@let payments = paymentsResource.value()?.data!.results;
@let paymentsPagination = paymentsResource.value()?.data!.pagination;
<section>
  <article>
    <app-employee [employee]="employee"/>
    <app-payment-form
      [paybleType]="Payables.Salary"
      [payment]="selectedPayment()"
      [ownable]="selectedSalary()"
      [payable]="pagable"
      (submitted)="this.paymentsResource.reload(); this.employeeResource.reload()"
      (reset)="reset()"
    />
  </article>
  <app-payment-list
    [data]="payments"
    [pagination]="paymentsPagination"
    (pageChange)="paymentsPage.set($event)"
    (selectedPayment)="this.selectedPayment.set($event)"
  />
  <app-ownable-list
    [data]="employee.salaries!"
    [entity]="pagable"
    [route]="payableEntity.Salary"
    [option]="true"
    [pagination]="undefined"
    (selected)="this.selectedSalary.set($event)"
  />


</section>
