@let personData = personList();
@let pagination = paginationData();

<div class="List">
  <h3 class="List-title">Listado de {{ entity() }}s</h3>
  <app-searcher
    [entity]="entity()"
    [route]="route()"
    (results)="handleResults($event)"
  />

  <div class="List-card-container">
    @for (person of personData; track person.id) {
      <app-person-card
        [person]="person"
        [entity]="entity()"
        [route]="route()"
        [action]="action()"
        (click)="this.selectedPerson.emit(person)"
      />
    }
  </div>


  @if(option()){
    <button
      class="Boton1"
      [routerLink]="`/${route()}`"
    >
      Agregar {{ entity() }}
    </button>
  }

  @if (pagination != undefined) {
    <app-pagination-buttons
      [pagination]="pagination"
      (pageChange)="this.changePage.emit($event)"
    />
  }

</div>
