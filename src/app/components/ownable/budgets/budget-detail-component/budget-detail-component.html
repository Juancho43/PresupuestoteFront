@let budget = this.budgetResource.value()!.data!;
@let currentWork = this.currentWorkResource.value()!.data!;
<section>
  <article>
    <app-budget [budget]="budget" />
    <app-client
      [client]="budget.owner!"
      routerLink="/client/detail/{{ budget.owner?.id }}"
    />
  </article>
  <app-work-list
    [works]="budget.works!"
    [budgetId]="budget.id!"
  />
  @if(currentWork){
    <app-work-detail
      [work]="currentWork"
    />
  }@else{
    <p>Seleccione un trabajo por favor</p>
  }


</section>
