<div class="Card">
  <div class="Card-Details">
    <h3>{{entity()}}</h3>
    <p>{{thing().description}}</p>
    <p>{{thing().payment_status}}</p>
    <p>{{thing().total | currency}}</p>
  </div>
  <div class="Card-Options">
    <app-card-button
      [text]="'Ver detalles'"
      [icon]="'info'"
      [link]="`/${route()}/detail/${thing().id!}`"
    />
    <app-card-button
      [text]="'Editar'"
      [icon]="'edit'"
      [link]="`/${route()}/edit/${thing().id}/${thing().owner?.id ?? 0}`"
    />
  </div>

</div>
