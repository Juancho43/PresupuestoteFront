@let invoice = this.invoiceResource.value()!.data!;
<section>
  <article>
    <app-invoice
      [invoice]="invoice"
    />
    <app-supplier
      [supplier]="invoice.owner!"
      routerLink="/supplier/detail/{{ invoice.owner?.id }}"
    />
  </article>
    <app-item-list
      [items]="invoice.materials"
    />
</section>
