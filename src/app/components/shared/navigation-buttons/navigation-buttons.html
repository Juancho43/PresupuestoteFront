<div class="container">
  <button
    (click)="goBack()"
    [disabled] ="!canGoBack()"
  >
    <img src="./icons/back_icon.svg" height="20px" width="20px" alt="Atrás">
  </button>

  <button
    [disabled] ="!canGoForward()"
    (click)="goForward()"
  >
    <img src="./icons/forward_icon.svg" height="20px" width="20px" alt="Adelante">
  </button>

</div>
