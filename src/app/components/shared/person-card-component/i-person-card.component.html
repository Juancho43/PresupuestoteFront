@let person = this.person()?.person!;
@let id = this.person()?.id!;

<div class="Card">
  <div class="Card-Details">
    <h3>{{entity()}}</h3>
    <p>{{person.last_name| titlecase }} {{person.name | titlecase }}</p>
    <p>{{person.phone_number}}</p>
  </div>
  <div class="Card-Options">

    <app-card-button-component
      [text]="`Añadir ${action()}`"
      [icon]="'add'"
      [link]="`/${action()}/new/${id}`"
    />
    <app-card-button-component
      [text]="'Ver detalles'"
      [icon]="'info'"
      [link]="`/${route()}/detail/${id}`"
      />
    <app-card-button-component
      [text]="'Editar'"
      [icon]="'edit'"
      [link]="`/${route()}/edit/${id}`"
    />
    <app-card-button-component
      [text]="'Eliminar'"
      [icon]="'delete'"
    />
  </div>

</div>
