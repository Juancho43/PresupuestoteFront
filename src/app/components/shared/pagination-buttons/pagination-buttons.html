<div>
  <button
    class="pagination-button"
    [disabled]="pagination().current_page === 1"
    (click)="onPreviousPage()">
    Previous
  </button>
  <p>{{pagination().current_page}}</p>
  <button
    class="pagination-button"
    [disabled]="!pagination().has_more_pages"
    (click)="onNextPage()">
    Next
  </button>
</div>
